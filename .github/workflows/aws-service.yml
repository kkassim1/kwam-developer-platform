name: manual-aws-service

on:
  workflow_dispatch:
    inputs:
      action:
        description: Deploy the current commit, roll back to an existing image tag, or destroy the demo
        required: true
        type: choice
        options:
          - deploy
          - rollback
          - destroy
      image_tag:
        description: Existing Git SHA tag; required only for rollback
        required: false
        type: string
      confirmation:
        description: Type the selected action exactly
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: portfolio-aws
  cancel-in-progress: false

jobs:
  change-service:
    name: ${{ inputs.action }} portfolio service
    runs-on: ubuntu-latest
    environment: portfolio-aws
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_budget_email: ${{ secrets.BUDGET_EMAIL }}
    steps:
      - name: Validate request
        env:
          REQUESTED_ACTION: ${{ inputs.action }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          test "$CONFIRMATION" = "$REQUESTED_ACTION"
          test -n "$AWS_REGION"
          test -n "$TF_STATE_BUCKET"
          if test "$REQUESTED_ACTION" = "rollback"; then
            echo "$REQUESTED_IMAGE_TAG" | grep -Eq '^[a-f0-9]{7,64}$'
          fi

      - uses: actions/checkout@v7

      - name: Authenticate to AWS with short-lived OIDC credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.10.6"

      - name: Initialize remote state
        working-directory: terraform/aws
        run: |
          tofu init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=kwam-platform/portfolio.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: Create cost-guarded foundation
        if: inputs.action == 'deploy'
        working-directory: terraform/aws
        run: |
          tofu plan -out=foundation.tfplan \
            -var='enable_aws_resources=true' \
            -var='enable_service_deployment=false'
          tofu apply -auto-approve foundation.tfplan

      - name: Resolve image
        if: inputs.action != 'destroy'
        id: image
        working-directory: terraform/aws
        env:
          REQUESTED_ACTION: ${{ inputs.action }}
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          repository_url="$(tofu output -raw ecr_repository_url)"
          if test "$REQUESTED_ACTION" = "deploy"; then
            image_tag="$GITHUB_SHA"
          else
            image_tag="$REQUESTED_IMAGE_TAG"
            aws ecr describe-images \
              --repository-name "${repository_url##*/}" \
              --image-ids "imageTag=$image_tag" >/dev/null
          fi
          echo "repository_url=$repository_url" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_uri=$repository_url:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        if: inputs.action == 'deploy'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build immutable application image
        if: inputs.action == 'deploy'
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: docker build --pull --tag "$IMAGE_URI" ./examples/hello-api

      - name: Push immutable application image
        if: inputs.action == 'deploy'
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: docker push "$IMAGE_URI"

      - name: Plan service change
        if: inputs.action != 'destroy'
        working-directory: terraform/aws
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          tofu plan -out=service.tfplan \
            -var='enable_aws_resources=true' \
            -var='enable_service_deployment=true' \
            -var="container_image=$IMAGE_URI"

      - name: Apply service change
        if: inputs.action != 'destroy'
        working-directory: terraform/aws
        run: tofu apply -auto-approve service.tfplan

      - name: Verify health and publish URL
        if: inputs.action != 'destroy'
        working-directory: terraform/aws
        run: |
          health_url="$(tofu output -raw health_url)"
          service_url="$(tofu output -raw service_url)"
          attempt=1
          until curl --fail --silent --show-error "$health_url"; do
            if test "$attempt" -ge 20; then
              echo "Deployment did not become healthy: $health_url" >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
          echo "### Deployment verified" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: $service_url" >> "$GITHUB_STEP_SUMMARY"
          echo "Health: $health_url" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ steps.image.outputs.image_uri }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Destroy portfolio environment
        if: inputs.action == 'destroy'
        working-directory: terraform/aws
        run: |
          repository_url="$(tofu output -raw ecr_repository_url)"
          tofu destroy -auto-approve \
            -var='enable_aws_resources=true' \
            -var='enable_service_deployment=true' \
            -var="container_image=$repository_url:0000000"
          echo "### Portfolio environment destroyed" >> "$GITHUB_STEP_SUMMARY"
          echo "The remote state bucket and OIDC bootstrap remain for future demonstrations." >> "$GITHUB_STEP_SUMMARY"
